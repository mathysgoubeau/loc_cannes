  <style>
    :root {
      --black: #000000;
      --gold: #c5a059;
      --sun: #f1c66f;
      --sea: #4fb7c5;
      --ivory: #fffaf0;
      --white: #ffffff;
      --muted: #5f5a52;
      --line: rgba(0, 0, 0, 0.12);
      --radius: 8px;
      --font: "Inter", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--black);
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.96), #ffffff 42%, rgba(255, 246, 231, 0.82));
      font-family: var(--font);
    }

    img { display: block; max-width: 100%; }

    a { color: inherit; text-decoration: none; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding: 16px clamp(16px, 5vw, 64px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.9);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 1px solid var(--black);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0 15px;
      color: var(--black);
      background: linear-gradient(135deg, var(--sun), var(--gold));
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .btn.ghost {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .hero {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(62px, 10vw, 116px) 0 28px;
    }

    .kicker {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 860px;
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 7vw, 6.2rem);
      font-weight: 300;
      line-height: 0.96;
      text-transform: uppercase;
    }

    .lead {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .gallery {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 78px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-flow: dense;
      gap: 12px;
    }

    .photo {
      position: relative;
      overflow: hidden;
      min-height: 220px;
      border-radius: var(--radius);
      background: var(--black);
      box-shadow: 0 18px 46px rgba(70, 52, 16, 0.1);
    }

    .photo.feature {
      grid-column: span 2;
      grid-row: span 2;
      min-height: 452px;
    }

    .photo.wide {
      grid-column: span 2;
    }

    .photo.tall {
      grid-row: span 2;
      min-height: 452px;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.06) contrast(1.03);
      transition: transform 0.55s ease, opacity 0.2s ease;
    }

    .photo:hover img {
      transform: scale(1.05);
      opacity: 0.94;
    }

    @media (max-width: 980px) {
      .photo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions,
      .top-actions .btn {
        width: 100%;
      }

      .photo-grid {
        grid-template-columns: 1fr;
      }

      .photo,
      .photo.feature,
      .photo.wide,
      .photo.tall {
        grid-column: span 1;
        grid-row: span 1;
        min-height: 270px;
      }
    }
  </style>
